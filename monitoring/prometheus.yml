global:
  scrape_interval: 15s

scrape_configs:

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "api"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api:8080"]

  - job_name: "auth-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["auth-service:8081"]
